name: ci

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

# One CI run per ref; a newer push cancels the in-flight run (checks + image build).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      # rust-toolchain.toml pins the channel (nightly), the rustfmt/clippy components,
      # and the wasm32 target; `rustup show` installs exactly that. Nightly isn't
      # preinstalled on the runner, so this step is required (unlike a stable project).
      - name: Install Rust toolchain
        run: rustup show
      # Cache the cargo registry + target dir across runs — a Leptos dep tree is large,
      # so a cold clippy+test compile is minutes; this makes unchanged-dep runs quick.
      - uses: Swatinem/rust-cache@v2
      - name: Format
        run: cargo fmt --all --check
      # `ssr` is the server build; the majority of the crate is behind it, so linting
      # and testing without it would skip most of the code. --all-targets also covers
      # the benches + examples.
      - name: Clippy
        run: cargo clippy --features ssr --all-targets -- -D warnings
      - name: Test
        run: cargo test --features ssr

  # The hydration bundle ships to every visitor, so its size is budgeted in
  # scripts/perf/wasm-budget.txt. The budget and the script that checks it both
  # existed already — but nothing ran the script, so the bundle drifted 38 KiB
  # past the ceiling across three PRs without anyone noticing. This job is the
  # part that was missing. It does NOT gate the image build below: an oversized
  # bundle is a deliberate-decision problem, not a broken build, and shouldn't
  # block a deploy.
  wasm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Install Rust toolchain
        run: rustup show
      - uses: Swatinem/rust-cache@v2
        with:
          # Its own cache key: this job compiles the wasm32 target under the
          # wasm-release profile, which the `rust` job above never builds.
          key: wasm
      # Same installer the Dockerfile uses, so CI and the image agree on version.
      - name: Install cargo-leptos
        run: curl --proto '=https' --tlsv1.3 -LsSf https://github.com/leptos-rs/cargo-leptos/releases/latest/download/cargo-leptos-installer.sh | sh
      # Only a release build emits the hashed assets wasm_size.sh measures.
      - name: Build
        run: cargo leptos build --release
      # Exits 2 when over budget, failing the job. Raising the ceiling is a
      # deliberate act: edit wasm-budget.txt and say why, as its history does.
      - name: Bundle size vs budget
        run: scripts/perf/wasm_size.sh

  # Build + publish the container image to ghcr.io — but ONLY after the rust checks pass
  # (a red build never ships an image), and never on a pull request. Tags: latest (default
  # branch), branch name, short SHA, and full semver on a v* tag. The image is built by the
  # repo's Dockerfile (cargo-leptos release build → slim Alpine runtime).
  docker:
    needs: [rust]
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write # push to ghcr.io
    steps:
      - uses: actions/checkout@v7
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=branch
            type=sha,format=short
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Cache image layers between runs so the toolchain/cargo-leptos install layers
          # (and unchanged source layers) don't rebuild every push.
          cache-from: type=gha
          cache-to: type=gha,mode=max
