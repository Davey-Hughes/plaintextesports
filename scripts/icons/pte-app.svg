<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <rect width="512" height="512" fill="#0d0d0d"/>
  <!-- Rounded grey frame concentric with iOS's ~22% corner mask: inset 48 with
       radius (114 - 48) ≈ 66 keeps it parallel to and inside the rounded edge,
       so the corners aren't clipped on the home screen. -->
  <rect x="48" y="48" width="416" height="416" rx="66" ry="66"
        fill="none" stroke="#d4d4d4" stroke-width="12" />
  <text x="256" y="256" fill="#d4d4d4"
        font-family="ui-monospace, 'SFMono-Regular', Menlo, Consolas, 'Liberation Mono', monospace"
        font-size="176" font-weight="600" text-anchor="middle"
        dominant-baseline="central" letter-spacing="-4">pte</text>
</svg>
