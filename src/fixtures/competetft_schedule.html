tions, prize forfeitures, and other disciplinary action.\n\n2.4. This English language version of this Global Player Policy will supersede any translation.\n\n2.5. Riot reserves the right in its sole discretion and at any time to update or modify this Global Player Policy\n\n3. Player Eligibility\n\n3.1. Residency\n\n3.1.1. Players may not participate in any competition if doing so would violate local law.\n\n3.1.2. Some TFT tournaments may require participants to be residents of a specific region. To be eligible to compete in a given region, the player must qualify as a legal resident in one of the listed countries or territories in the region for at least one year prior to the tournament date.\n\n3.1.3. Players may not be the resident of two or more regions at the same time. Any player who relocates to a new region, will remain a resident of his or her prior region until the one-year anniversary of their relocation.\n\n3.1.4. Riot Games recognizes the following twelve (12) competitive geographic “regions”, and Riot Games defines residency as follows:\n\n3.1.4.1. North America. The North America (NA) region consists of the following countries and territories: USA, Canada\n\n3.1.4.2. Latin America. The Latin America (LATAM) region consists of the following countries and territories:All Caribbean Islands, Argentina, Belize, Bolivia, Chile, Colombia, Costa Rica, Ecuador, El Salvador, French Guiana, Guatemala, Guyana, Honduras, Mexico, Nicaragua, Panama, Paraguay, Peru, Suriname, Uruguay, Venezuela\n\n3.1.4.3. Brazil. The Brazil region consists of the following countries and territories: Brazil\n\n3.1.4.4. Europe. The European (EU) region consists of the following countries and territories: Albania, Andorra, Austria, Belgium, Bosnia and Herzegovina, Bulgaria, Croatia, Cyprus, Czech Republic, Denmark, Estonia, Finland, France, Germany, Greece, Hungary, Iceland, Ireland, Italy, Kosovo, Latvia, Liechtenstein, Lithuania, Luxembourg, Macedonia, Malta, Monaco, Montenegro, Netherlands, Norway, Poland, Portugal, Romania, San Marino, Serbia, Slovakia, Slovenia, Spain, Sweden, Switzerland, United Kingdom (UK), Vatican City (Holy See)\n\n3.1.4.5. CIS. The CIS region consists of the following countries and territories: Azerbaijan, Armenia, Belarus, Georgia, Kazakhstan, Kyrgyzstan, Moldova, Mongolia, Russia, Tajikistan, Turkmenistan, Uzbekistan, Ukraine\n\n3.1.4.6. MENA\u0026I. The Middle East, North Africa and India (MENA\u0026I) region consists of the following countries and territories: Afghanistan, Algeria, Bahrain, Djibouti, Egypt, India, Iraq, Israel, Jordan, Kuwait, Lebanon, Libya, Mauritania, Morocco, Oman, Pakistan, Palestine (UN observer state), Qatar, Saudi Arabia, Somalia, Sudan, Syria, Tunisia, United Arab Emirates, Western Sahara (Sahrawi Arab Democratic Republic), Yemen, Bangladesh, Sri Lanka, Nepal and Maldives.\n\n3.1.4.7. Turkey. The Turkey region consists of the following countries and territories: Turkey\n\n3.1.4.8. Oceania. The Oceania (OCE) region consists of the following countries and territories: Australia, New Zealand, Guam, New Caledonia, French Polynesia, Fiji, Northern Mariana Islands.\n\n3.1.4.9. South Korea. The South Korea region consists of the following countries and territories: South Korea\n\n3.1.4.10. South East Asia. The South East Asia region consists of the following countries and territories: Chinese Taipei, Hong Kong, Indonesia, Macau, Malaysia, Philippines, Singapore, Thailand, Vietnam.\n\n3.1.4.11. China. The China region consists of the following countries and territories: China\n\n3.1.4.12. Japan. The Japan region consists of the following countries and territories: Japan\n\n3.1.4.13. Other countries or territories. Any player who is a resident of a country or territory not otherwise listed above, should contact the nearest regional Riot office for guidance, prior to registering for a competition.\n\n3.1.5. Joint Regions. Some competitions may combine multiple regions into a single pan-region. In those competitions, a player must qualify as an eligible participant in one of the constituent regions to participate.\n\n3.1.5.1. Riot reserves the right to add, modify or remove competitive regions, or to change a player’s eligible competitive region at Riot’s sole discretion at any time.\n\n3.1.6. Proof of Residency\n\n3.1.6.1. Riot may require a player to provide proof of residency prior to, during or following a competitive tournament. Players may prove residency by submitting Government-issued documentary evidence of eligibility to their regional Riot office (e.g., driver’s license, government benefits records, military/draft registration papers).\n\n* Minors may also have a parent or guardian prove residency on their behalf by first, providing documentary evidence of the parent- /guardian-child relationship (e.g., a birth certificate) and second, submitting documentary evidence belonging to the parent/guardian, as outlined above.\n\n3.1.6.2. Riot may, at its discretion, establish additional or alternative regional processes for proving residency.\n\n3.2. Minimum Age\n\n3.2.1. The minimum age to participate in TFT competition is determined at the regional level and subject to BOTH of the following:\n\n3.2.1.1. The minimum age to participate may not be younger than 13 years of age; AND\n\n3.2.1.2. The minimum age to participate may not be younger than the Game Rating requisite age for TFT in that region.\n\n3.2.2. All players who are younger than the age of majority in their region must receive parental permission to participate in a TFT competition.\n\n3.3. Ineligible Players.\n\n3.3.1. Competition participants may not be employees of Riot Games, Inc. (“RGI”) or any of their respective affiliates at the start of or at any point during a TFT competition.\n\n3.3.2. In addition, for a competition administered by a third party; directors, officers and employees of the entity operating the competition, its parent, and any of their respective affiliate companies, subsidiaries, agents, professional advisors, advertising and promotional agencies, and immediate family and household members of each are not eligible to participate in any competitions, win any prizes, or to have any share or interest of any competition player’s prize.\n\n3.3.3. Players who are subject to an active competitive ban in any Riot esport are not eligible to compete in sanctioned TFT competitions.\n\n3.4. Additional Rules.\n\n3.4.1. Some competitions may set additional requirements for eligibility. In such cases, those rules shall govern eligibility for that specific competition. In the event there is any conflict or inconsistency between the additional requirements and the requirements in this Global Player Policy, the provisions of this Global Player Policy shall prevail.\n\n4. Player Accounts\n\n4.1. A player must only use one account during a competition.\n\n4.2. Account names should not include any insulting, derogatory or otherwise inappropriate words or phrases.\n\n4.3. If two players with identical account names are entering the same competition at approximately the same time, then the players should work together with the competition organizer to find a compromise. If no compromise can be found, then the account name shall be disallowed for both players, and both shall be required to select a new account name that conforms with these guidelines.\n\n4.4. Riot reserves the right to deny or revoke the use of an account name for any reason.\n\n5. Sponsorships\n\nParticipants may sign sponsorship deals with brands and companies, and represent those sponsors while participating in TFT competitions as long as they are otherwise in compliance with the rules and restrictions set forth in this section.\n\n5.1. Restrictions\n\n5.1.1. Participants are prohibited from being sponsored by any brand whose business falls within the Globally Prohibited Sponsorship Categories:\n\nGlobally Prohibited Sponsorship Categories\n\n* Any non-Riot video game, video game developer or publisher;\n\n* Any video game consoles;\n\n* Any non-Riot esport, video game tournament, league, or event;\n\n* Gambling, sportsbook and casinos;\n\n* Fantasy esports operators (including daily fantasy);\n\n* Any prescription drugs or drugs that are not “over-the-counter” drugs;\n\n* Firearms, ammunition, or other weapons, and peripherals thereof;\n\n* Pornography, pornographic products, and other adult content or platforms;\n\n* Tobacco products or paraphernalia;\n\n* Alcohol products (including non-alcoholic beverages marketed by alcohol companies) or other intoxicants the sale or use of which is regulated by Applicable Law;\n\n* Products that contain non-psychoactive cannabis-derived compounds, including cannabidiol (CBD);\n\n* Sellers of or marketplaces for virtual items known to be counterfeit or illegal;\n\n* Seller of or marketplaces for goods or services that violate the Riot Terms of Service;\n\n* Cryptocurrencies, or any other unregulated financial instruments or markets;\n\n* Cryptocurrency exchanges;\n\n* NFTs;\n\n* Blockchain technology companies;\n\n* Political campaigns or political action committees;\n\n* Charities that endorse particular religious or political positions, or are not reputable (by way of example, Red Cross, Stand-Up to Cancer and other similar mainstream charities would be considered reputable);\n\n* Businesses engaged in offering Contracts for Difference (CFD) trading, or similar trading on margin products;\n\n* Any other esports team, owner, or affiliate thereof;\n\n* Government entities (including any government agency or government funded business).\n\n5.2 Compliance with TFT Activations. Players are prohibited from covering, blocking or removing any TFT Sponsor activation or markings at any TFT event. All players are required to participate in TFT Sponsor activations, including acceptance of any awards or participation in any ceremonies in the manner reasonably directed by Riot. In connection with such acceptance or participation, players may be photographed in connection with TFT Sponsor logos or markings, but will not be required to directly interact with any TFT Sponsor product (for example, if Riot attaches a TFT Sponsor to an award, such as “Player of the Game” or “Event MVP”, Riot may require the recipient(s) of the award to accept a branded item from the TFT Sponsor (such as car keys) but will not require the recipient(s) to directly interact with the underlying sponsored product (such as getting in or driving the car)).\n\n5.3. Apparel\n\n5.3.1. Riot reserves the right at all times to impose a ban on objectionable or offensive apparel including but not limited to apparel that:\n\n5.3.1.1. Contains any false, unsubstantiated, or unwarranted claims for any product or service, or testimonials, that Riot, in its sole and absolute discretion, considers inappropriate.\n\n5.3.1.2. Advertises any brand whose business falls within the Globally Prohibited Sponsorship Categories.\n\n5.3.1.3. Contains any material constituting or relating to any activities which are illegal in any Riot region, including but not limited to, a lottery or an enterprise, service or product that abets, assists or promotes gambling.\n\n5.3.1.4. Contains any material that is defamatory, obscene, profane, vulgar, repulsive or offensive, or that describes or depicts any internal bodily functions or symptomatic results of internal conditions, or refers to matters which are not considered socially acceptable topics.\n\n5.3.1.5. Contains any trademark, copyrighted material or other element of intellectual property that is used without the owner's consent or that may give rise to, or subject Riot or its affiliates to, any claim of infringement, misappropriation, or other form of unfair competition.\n\n5.3.1.6. Disparages or libels any opposing player or any other person, entity or product.\n\n5.3.1.7. Riot reserves the right to refuse entry or continued participation in the match to any player who does not comply with the aforementioned apparel rules.\n\n5.4. Professional Teams\n\n5.4.1. Players may sign contracts to represent “professional esports teams” or other esports organizations. This will be treated as any other player sponsorship and must adhere to the sponsorship guidelines and restrictions set forth in this section.\n\n6. Player Conduct\n\n6.1. Code of Conduct\n\n6.1.1. Players are required to comply with the Riot Games Esports Global Code of Conduct, incorporated herein by reference. In the event of conflict between this Global Player Policy and the Riot Games Esports Global Code of Conduct, Riot shall determine which policy applies (in its sole discretion).\n\n6.2. Competition Conduct\n\n6.2.1. Collusion. Collusion is prohibited. Collusion is defined as any agreement among two (2) or more players to disadvantage opposing players. Collusion includes, but is not limited to, acts such as:\n\n* Soft play, which is defined as any agreement among two (2) or more players to not damage, impede or otherwise play to a reasonable standard of competition in a game.\n\n* Pre-arranging to split prize money and/or any other form of compensation.\n\n* Sending or receiving signals, electronic or otherwise, from a confederate to/from a player.\n\n* Deliberately losing a game for compensation, or for any other reason, or attempting to induce another player to do so.\n\n6.2.2. Identity. A player may not cover his or her face or attempt to conceal his or her identity from Riot officials. Riot officials must be able to distinguish the identity of each player at all times and may instruct players to remove any material that inhibits the identification of players or is a distraction to other players or Riot officials.\n\n6.3. Unprofessional Behavior\n\n6.3.1. Statements Regarding Riot Games and TFT. Players may not give, make, issue, authorize or endorse any statement or action having, or designed to have, an effect prejudicial or detrimental to the best interest Riot Games or its affiliates, or TFT, as determined in the sole and absolute discretion of Riot.\n\n6.3.2. Player Behavior Investigation. If Riot determines that a Player has violated the Summoner’s Code, the TFT Terms of Service, the Riot Games Esports Global Code of Conduct, or other rules of TFT, Riot officials may assign penalties at their sole discretion. If a Riot official contacts a Player to discuss the investigation, the Player is obligated to tell the truth. If a Player withholds information or misleads a Riot official, creating an obstruction of the investigation then the Player is subject to punishment.\n\n6.3.3. Document or Other Requests. Documentation or other reasonable items may be required at various times as requested by Riot officials. If the documentation is not completed to the standards set by Riot then the player may be subject to penalties. Penalties may be imposed if the items or documentation requested are not received and/or completed at the required time or does not meet the standards set by Riot.\n\n6.4. Subjection to Penalty\n\nAny person found to have engaged in or attempted to engage in any act that Riot believes, in its sole and absolute discretion, constitutes unfair play will be subject to penalty according to the Riot Games Esports Global Code of Conduct, this Global Player Policy, and any other applicable rules. The nature and extent of the penalties imposed due to such acts shall be in the sole and absolute discretion of Riot.\n\n6.5. Penalties\n\nUpon discovery of any Player committing any violations of the rules, Riot may without limitation of its authority under Section 6.4, issue the following penalties:\n\n* Verbal Warning(s)\n\n* Fine(s) and/or Prize Forfeiture(s)\n\n* Game Forfeiture(s)\n\n* Match Forfeiture(s)\n\n* Suspension(s)\n\n* Disqualification(s)\n\nRepeated infractions are subject to escalating penalties, up to, and including, disqualification from future participation in Riot events. It should be noted that penalties may not always be imposed in a successive manner. Riot, in its sole discretion, for example, can disqualify a player for a first offense if the action of said player is deemed egregious enough to to be worthy of disqualification by Riot officials. Standard penalties may be provided from time-to-time in the form of a Global Penalty Index. Riot reserves the right to modify or exceed the penalties set forth in the GPI in its sole discretion.\n\n6.6. Right to Publish\n\nRiot shall have the right to publish a declaration stating that a Player has been penalized. Any Players which may be referenced in such declaration hereby waive any right of legal action against Riot Games, Inc., and/or any of their parents, subsidiaries, affiliates, employees, agents, or contractors.\n\n7. Spirit of the Rules\n\n7.1. Finality of Decisions\n\nAll decisions regarding the interpretation of these rules, player eligibility, and penalties for misconduct, lie solely with Riot, the decisions of which are final. Riot decisions with respect to this Global Player Policy cannot be appealed and shall not give rise to any claim for monetary damages or any other legal or equitable remedy.\n\n7.2. Rule Changes\n\nThis Global Player Policy may be amended, modified or supplemented by Riot, from time to time, in order to ensure fair play and the integrity of TFT competition.\n\n7.3. Language Differences\n\nThese Rules may be presented in a variety of languages to the competitors of the event. In any scenario in which the translation of these rules creates a conflict, the English version of this ruleset will prevail.\n\n7.4. Best Interests of Riot Games\n\nRiot officials at all times may act with the necessary authority to preserve the best interests of the Riot Games. This power is not constrained by the lack of any specific language in this document. Riot officials may use any form of punitive actions at their disposal against any entity whose conduct is not within the confines of the best interests of Riot Games."])</script><script>self.__next_f.push([1,"5:[[\"$\",\"$L18\",null,{}],[\"$\",\"$L19\",null,{}],[\"$\",\"$L1a\",null,{\"sport\":\"tft\",\"children\":[\"$\",\"$L1b\",null,{\"state\":{\"locale\":\"en-US\",\"translation\":{\"tft.number.k\":\"K\",\"tft.number.m\":\"M\",\"tft.number.b\":\"B\",\"tft.tbd\":\"TBD\",\"tft.date\":\"Date\",\"tft.you\":\"You\",\"tft.date.today\":\"Today\",\"tft.date.alsoLive\":\"Also Live\",\"tft.date.earlierToday\":\"Earlier Today\",\"tft.date.laterToday\":\"Later Today\",\"tft.date.yesterday\":\"Yesterday\",\"tft.date.tomorrow\":\"Tomorrow\",\"tft.date.soon\":\"SOON\",\"tft.match.wins\":\"{wins}W\",\"tft.match.ties\":\"{ties}T\",\"tft.match.losses\":\"{losses}L\",\"tft.match.semanticWins\":\"{wins} wins\",\"tft.match.semanticLosses\":\"{losses} losses\",\"tft.match.vs\":\"VS\",\"tft.match.live\":\"LIVE\",\"tft.match.game\":\"GAME\",\"tft.match.recap\":\"RECAP\",\"tft.match.matchRecap\":\"MATCH RECAP\",\"tft.match.fullMatch\":\"FULL MATCH\",\"tft.match.gameNumber\":\"GAME {game}\",\"tft.match.spoilers.label\":\"POSSIBLE SPOILERS\",\"tft.match.spoilers.reveal\":\"CLICK TO REVEAL\",\"tft.match.spoilers.tap\":\"TAP TO REVEAL SPOILERS\",\"tft.match.endedEarly\":\"The match concluded before this game was played.\",\"tft.match.watchTeamVsTeam\":\"Watch {leftTeam} vs {rightTeam}\",\"tft.strategy.bestOf\":\"BEST OF {count}\",\"tft.strategy.playAll\":\"PLAY {count}\",\"tft.strategy.bestOf.abbr\":\"Bo{count}\",\"tft.strategy.playAll.abbr\":\"P{count}\",\"tft.message.noFutureScheduledEvents\":\"No future scheduled matches for your selection.\",\"tft.message.invalidResponse\":\"Service returned an invalid response.\",\"tft.message.browserOutdated\":\"You are using an outdated browser. Please upgrade your browser to improve your experience.\",\"tft.message.vodNotAvailable\":\"VOD not available.\",\"tft.message.recapNotAvailable\":\"RECAP not available.\",\"tft.message.regionlessAccount.body\":\"It looks like you are using a regionless account that hasn't play vents and milestones\",\"tft.home.events.noPastMatches\":\"You've traveled in time to the start of Valorant Esports\",\"tft.home.events.noPastMatchesMsg\":\"It's matches all the way down from here...\",\"tft.home.leagueFilter.title\":\"Home League Filter\",\"tft.home.latestFeatures\":\"LATEST FEATURES\",\"tft.home.esports\":\"ESPORTS\",\"tft.home.liveMatches\":\"LIVE MATCHES\",\"tft.home.news\":\"NEWS\",\"tft.home.latestNews\":\"LATEST NEWS\",\"tft.home.viewAll\":\"VIEW ALL\",\"tft.home.readMore\":\"READ MORE\",\"tft.home.vods\":\"VODS\",\"tft.home.connect\":\"CONNECT\",\"tft.home.twitter\":\"TWITTER\",\"tft.home.twitterUrl\":\"https://twitter.com/ValorantEsports\",\"tft.home.instagram\":\"INSTAGRAM\",\"tft.home.instagramUrl\":\"https://www.instagram.com/valorantesports/\",\"tft.home.trovo\":\"TROVO\",\"tft.home.trovoUrl\":\"\",\"tft.home.twitch\":\"TWITCH\",\"tft.home.twitchUrl\":\"https://www.twitch.tv/valorant\",\"tft.home.vk\":\"\",\"tft.home.vkUrl\":\"\",\"tft.home.youtube\":\"YOUTUBE\",\"tft.home.youtubeUrl\":\"https://www.youtube.com/channel/UCA1d3HFGFUmkKr2JIUA5Vlw\",\"tft.home.spoilerProtection\":\"Spoiler Protection\",\"tft.home.text\":\"Welcome to CompeteTFT - a new TFT Esports platform designed to make it easier for players and professionals to participate in and follow the TFT Esports scene. In Set 15, we're launching with support for the Pro Circuit, a new tier of competition in the TFT Esports ecosystem bringing together the most elite players in each region. Players in the Pro Circuit compete through 3 Cups, with total placements determining seeding for the prestigious Regional Finals and a chance to qualify for the global Tactician's Crown.\",\"tft.home.subText\":\"This is just the beginning—stay tuned for more functionality in Set 16.\",\"tft.home.button.proCircuit\":\"View Pro Circuit Events\",\"tft.home.button.proPoints\":\"View Pro Points\",\"tft.news.goToList\":\"GO TO ARTICLE LIST\",\"tft.news.loadMore\":\"LOAD MORE\",\"tft.schedule.title\":\"Schedule\",\"tft.schedule.description\":\"Browse events, registration deadlines, and snapshot times from the current set circuit\",\"tft.schedule.events\":\"Events\",\"tft.schedule.milestones\":\"Milestones\",\"tft.schedule.regions\":\"Regions\",\"tft.schedule.all\":\"All\",\"tft.schedule.allEvents\":\"All Events\",\"tft.schedule.allMilestones\":\"All Milestones\",\"tft.schedule.allRegions\":\"All Regions\",\"tft.schedule.cupSnapshots\":\"Cup Snapshots\",\"tft.schedule.trialSnapshots\":\"Trial Snapshots\",\"tft.schedule.ladderPointSnapshots\":\"Ladder Point Snapshots\",\"tft.schedule.pathToPro\":\"Path to Pro\",\"tft.schedule.proCircuit\":\"Pro Circuit\",\"tft.schedule.registrationOpen\":\"Registration Open\",\"tft.schedule.registrationClose\":\"Registration Close\",\"tft.schedule.snapshot\":\"Snapshot\",\"tft.schedule.day1\":\"Day 1\",\"tft.schedule.day2\":\"Day 2\",\"tft.schedule.day3\":\"Day 3\",\"tft.schedule.finals\":\"Finals\",\"tft.schedule.today\":\"Today\",\"tft.schedule.filter\":\"Filter\",\"tft.schedule.approx\":\"APPROX\",\"tft.schedule.pastResults\":\"PAST RESULTS\",\"tft.schedule.error\":\"There was an issue loading the events. Please try again later.\",\"tft.standings.pts\":\"{points} PTS\",\"tft.standings.points\":\"Points\",\"tft.standings.phase\":\"PHASE:\",\"tft.standings.stage\":\"Stage\",\"tft.standings.champions\":\"Champions\",\"tft.standings.lastChanceQualifiers\":\"Last Chance Qualifiers\",\"tft.standings.masters\":\"Masters\",\"tft.standings.gameChangers\":\"Game Changers\",\"tft.standings.overallPointStandings\":\"Overall Points Standings\",\"tft.standings.team\":\"Team\",\"tft.standings.totalPoints\":\"Total Points\",\"tft.standings.stage1ChallengersPlayoffs\":\"Stage 1 Challengers Playoffs\",\"tft.standings.stage1Masters\":\"Stage 1 Masters\",\"tft.standings.stage2ChallengersPlayoffs\":\"Stage 2 Challengers Playoffs\",\"tft.standings.stage2Masters\":\"Stage 2 Masters\",\"tft.standings.advanceToKickoff\":\"Advance to Kickoff\",\"tft.footer.copyright\":\"© {year} Riot Games. All Rights Reserved.\",\"tft.footer.privacy\":\"Privacy Notice\",\"tft.footer.terms\":\"Terms of Service\",\"tft.footer.cookie\":\"Cookie Preferences\",\"tft.footer.accessibility\":\"Accessibility\",\"tft.vods.comingSoon\":\"Coming soon\",\"tft.vods.error\":\"Oops!\",\"tft.vods.errorMessage\":\"Something went wrong.\",\"tft.vods.errorReset\":\"Try again\",\"tft.league.round.tiebreakers\":\"Tie Breakers\",\"tft.formatReveal.hero.header\":\"The Future of Competitive VALORANT\",\"tft.formatReveal.intro.header\":\"Thanks to our players and fans, VALORANT is today's fastest growing esport. Between the nail-biter overtimes, the ever-evolving meta, and the Brimstone-crumbling anime-fight-scene music videos, we're off to an exciting start. But we're still just scratching the surface of VALORANT's competitive potential. So in 2023, we are introducing major evolutions to the VALORANT competitive ecosystem that will create an even better player and fan experience and propel VALORANT to become the #1 competitive FPS in the world.\",\"tft.formatReveal.intro.body\":\"Here's a preview of our vision to turn VALORANT into a multigenerational sport in 2023 and beyond. More details on every layer of the ecosystem will be delivered over the course of the year, but we'd like to show you where we're headed. That said, we're still actively building this so expect some things to change between now and next year. You ready?\",\"tft.formatReveal.fans.header\":\"PLAYERS AND FANS FIRST.\",\"tft.formatReveal.fans.subheader\":\"We're building a player-driven competitive ecosystem that will inspire generations of future head-snapping, round-clutching superstars. We recognize the expectations of a hungry and growing global audience, and we're here to meet them. Here's a look at what's coming:\",\"tft.formatReveal.fans.block1.header\":\"NEW PATH TO PRO\",\"tft.formatReveal.fans.block1.subheader\":\"A PATH TO PRO, ACCESSIBLE TO EVERY PLAYER, RIGHT INSIDE VALORANT\",\"tft.formatReveal.fans.block1.body\":\"Sometimes it's not enough to watch. If you've got the skills, it's time to play. In the future, a new in-game competitive mode will give every player a chance to feel what it's like to compete like a professional, and an opportunity to work toward their dreams. Top-ranked teams will be given the chance to qualify into their respective domestic leagues and take steps on their path to pro. We're excited to see how this system will help foster and highlight up-and-coming talent in addition to the standard ranked ladder. Who knows, it could be you we see on stage.\",\"tft.formatReveal.fans.block2.header\":\"NEW FAN EXPERIENCE\",\"tft.formatReveal.fans.block2.subheader\":\"NEW WAYS TO SUPPORT AND CELEBRATE YOUR FAVORITE TEAMS WITHIN VALORANT\",\"tft.formatReveal.fans.block2.body\":\"With this evolution of our ecosystem will come the ability to support your favorite teams. While watching or playing, we want to give you more ways to flex your fandom. More details to come later this year.\",\"tft.formatReveal.fans.block3.header\":\"NEW LEAGUES FOR THE WORLD'S TOP TEAMS\",\"tft.formatReveal.fans.block3.subheader\":\"A BRAND-NEW PREMIER LEVEL OF WEEKLY COMPETITION BETWEEN THE WORLD'S BEST TEAMS\",\"tft.formatReveal.fans.block3.body\":\"Want more to watch? You got it. In 2023, we're introducing entirely new premier-level leagues that will see the best players in the world compete in international competition for spots at our global events. By creating regular competition that spans multiple regions, we expect to see some new rivalries that span global borders. Teams at this level will be long-term partners of the VALORANT esports ecosystem, and fully invested in creating the best fan experience possible.\",\"tft.formatReveal.fans.block4.header\":\"EXPANDED REGIONAL LEAGUES\",\"tft.formatReveal.fans.block4.subheader\":\"DOMESTIC LEAGUES THAT EVOLVE AND EXPAND THE CURRENT CHALLENGERS SYSTEM\",\"tft.formatReveal.fans.block4.body\":\"Regional pride and hometown heroes deserve a spot center stage. To see that happen, we're connecting regional competition to the new in-game tournament mode and introducing more domestic leagues around the world.\",\"tft.formatReveal.structure.header\":\"OUR NEW VALORANT ESPORTS STRUCTURE\",\"tft.formatReveal.structure.subheader\":\"This new structure was created to provide you with more VALORANT esports at every level—from the players competing to reach their regional stage to premier-level global competition. Here's what it looks like.\",\"tft.formatReveal.structure.block1.header\":\"PATH TO PRO\",\"tft.formatReveal.structure.block1.body\":\"If you want it, it's yours. With a new in-game competitive mode, every player will be able to envision their personal path to pro. This system will directly integrate with our esports ecosystem, providing the most competition-hungry players around the world a rewarding challenge beyond ranked: the opportunity to qualify for domestic leagues in their region. We're excited to present an even higher goal beyond Radiant, and to provide esports organizations with a new method of scouting their region's most promising talent.\",\"tft.formatReveal.structure.block2.header\":\"DOMESTIC LEAGUES GAME CHANGERS THIRD-PARTY\",\"tft.formatReveal.structure.block2.body.header1\":\"DOMESTIC LEAGUES\",\"tft.formatReveal.structure.block2.body.body1\":\"Building off of VCT Challengers, domestic leagues will continue to offer higher levels of organized competition for the best players in each region. Open up opportunities by showcasing your talents on a grand stage where the world's most elite teams can take notice. These leagues will also closely integrate with the in-game tournament mode to provide greater levels of accessibility for rising talent. You've already seen some of our initial plans for domestic leagues with VRL's in Europe, and you'll start to see similar leagues launch in other regions in 2023.\",\"tft.formatReveal.structure.block2.body.header2\":\"GAME CHANGERS\",\"tft.formatReveal.structure.block2.body.body2\":\"Last year, more than 40 Game Changers events provided opportunities for women in VALORANT esports. We can do more, though. In 2023, we're heavily investing in Game Changers by leveling up tournaments around the world, providing more training sessions to aspiring talent, and continuing the Game Changers Championship. We've learned a lot from our first year of the program. Our ultimate goal is to see all genders represented across every level of VALORANT competition.\",\"tft.formatReveal.structure.block2.body.header3\":\"THIRD PARTY TOURNAMENTS\",\"tft.formatReveal.structure.block2.body.body3\":\"Off-season doesn't mean we're powering down VALORANT esports competition. Like you'll see in 2022, we'll open the window for third-party tournaments during official competition off-seasons each year. During this time, we expect to see massive roster changes, speculation on who clutched the off-season crown, and the start of new rivalries. Third-party tournaments can explore these storylines through a “pre-season” window where teams test their line-ups and fans get a taste of the season to come.\",\"tft.formatReveal.structure.block3.header\":\"INTERNATIONAL LEAGUES\",\"tft.formatReveal.structure.block3.body1\":\"International leagues will be our new premier-level week-over-week competition in the VALORANT esports ecosystem. Goliath-vs-Goliath competition between the world's best players and top-tier organizations—on LAN, and in studios with audiences (health and safety permitting), across the globe. These leagues will be the new method by which teams qualify for our premier-level global tournaments, Masters and Champions.\",\"tft.formatReveal.structure.block3.body2\":\"At this level, we'll incorporate a long-term partnership model with a select number of teams in each league (ensuring representation of all regions). This will secure a foundation for long-term planning, deep investment in the ecosystem, and more engaging celebrations of fandom. Currently, we plan to introduce three leagues around the world that will include teams from multiple regions based on geographical proximity. Teams from North America, Latin America, and Brazil will make up a league; Teams from Europe, Russia, Turkey, and MENA will make up a league; and teams from Southeast Asia, Korea, Japan, South Asia, and Oceania will make up a league. These international Leagues will bring diverse communities together to build rivalries around the highest level of play and the biggest superstars.\",\"tft.formatReveal.structure.block4.header\":\"GLOBAL TOURNAMENTS\",\"tft.formatReveal.structure.block4.body1\":\"The global tournaments you know and love aren't going anywhere. Multiple premier-level global competitions will take place each year with top teams from international leagues competing at Masters and Champions events while Game Changers will also continue to have a Championship event. Additionally, we want to see VALORANT played in front of a live audience as much as you do. We're working on how to make this a safe reality for this year and for the future of VALORANT tournaments.\",\"tft.formatReveal.structure.block4.body2\":\"Over the course of the next few months we'll provide additional details on each layer of competition in the ecosystem, as well as the team selection process for international leagues. In the lead-up to next season we'll be listening closely, so please don't hesitate to share your thoughts and questions as we build the next evolution of our sport. We wouldn't be here without your support, and it's critical that the VALORANT of tomorrow reflects your dreams from today. Thank you, thank you, thank you. We'll see you in the future.\",\"tft.formatReveal.partnerships.header\":\"TEAM PARTNERSHIPS\",\"tft.formatReveal.partnerships.subheader\":\"WHY DOES A PARTNERSHIP MODEL MAKE SENSE FOR OUR INTERNATIONAL LEAGUES?\",\"tft.formatReveal.partnerships.body1\":\"In 2017, we introduced a partnership model for League of Legends Esports, with the League Championship Series. This model created a formal partnership between a select number of teams and Riot Games, allowing everyone to invest against a unified long-term vision. Since 2017, this model has been adopted for leagues in North America, Europe, China, Latin America, Korea, Brazil, Turkey, and across the wider esports industry. Players have benefited from larger salaries and more robust support systems, while teams have been able to plan multiple years into the future. A formal relationship with teams has enabled us to collaborate closely on ambitious events and digital experiences to create a deeply engaging esports experience.\",\"tft.formatReveal.partnerships.body2\":\"With VALORANT, we are building today's most thrilling esport alongside the most well-managed, ambitious, and exciting organizations in the industry. We will begin a team application process to build this new ecosystem with esports organizations who share our vision. For 2023, we will select partner teams across our three international leagues who have a track record of building great esports experiences, developing players, and can meaningfully contribute to the long-term growth of VALORANT esports. To make sure we attract the best teams in the world, we will forgo any participation/franchising fees and instead provide financial stipends to the selected teams in return for their investment in growing the ecosystem.\",\"tft.formatReveal.model.header\":\"OUR PHILOSOPHY\",\"tft.formatReveal.model.subheader\":\"HOW DID RIOT LAND ON THIS MODEL FOR VALORANT ESPORTS?\",\"tft.formatReveal.model.preBody\":\"We'll use everything we learned from the past 10 years in esports to supercharge VALORANT into the next great multigenerational esport. Development of our new ecosystem is centered on four pillars:\",\"tft.formatReveal.model.block1\":\"The Highest Levels of Competitive Integrity at Every Level of Competition\",\"tft.formatReveal.model.block2\":\"Consistent and Frequent Inter-Regional and Global Matches\",\"tft.formatReveal.model.block3\":\"A Healthy and Sustainable Ecosystem which Empowers Long-term Planning\",\"tft.formatReveal.model.block4\":\"Clear Path-to-Pro for Every VALORANT Player in the World\",\"tft.formatReveal.model.postBody\":\"We think that together, all of these elements will contribute to a competitive ecosystem that will make VALORANT the most thriving esport in the world. We want to build top level of competition that will provide more exciting matches, new events that will thrill live audiences, and engaging experiences for millions of online fans.\",\"tft.formatReveal.social.header\":\"TELL ME MORE\",\"tft.formatReveal.social.subheader\":\"Where can I get more info on _______?\",\"tft.formatReveal.social.body\":\"We're extremely excited to share more details about this new ecosystem with you, but the truth is, we're still building it! We expect to share additional information, and dive deep into each layer in future updates over the course of the year. Hang tight for now, and we'll make sure that we don't go radio-silent for too long.\",\"tft.formatReveal.readLess\":\"READ LESS\",\"tft.video.error\":\"Something went wrong with video player.\",\"tft.leagueFilter.error\":\"There was an issue getting the leagues. Please try again later.\",\"tft.not.found\":\"Not Found\",\"tft.not.found.message\":\"Unable to find the requested resource.\",\"tft.pickems.nowLive\":\"Now LIVE for {tournament}!\",\"tft.pickems.nowLiveCTA\":\"Now LIVE!\",\"tft.pickems.playNow\":\"PLAY NOW\",\"tft.pickems.predictTheWinners\":\"Predict the Winners\",\"tft.pickems.playWithFriends\":\"Play with Friends\",\"tft.pickems.earnRewards\":\"Earn Rewards\",\"tft.pickems.groupsStageName\":\"Group Stage\",\"tft.pickems.playoffsStageName\":\"Playoff\",\"tft.pickems.playoffsStage\":\"Playoffs\",\"tft.pickems.stagePicks\":\"{stageName} Picks\",\"tft.pickems.players\":\"Players\",\"tft.pickems.points\":\"Points\",\ ed that you're trying to register for a Compete Card from the {shard} shard, which is not allowed. Please create an account on EUW to compete.\",\"tft.players.profile.leave.title\":\"Leave Setup?\",\"tft.players.profile.leave.description\":\"Are you sure you want to leave? You can always register for your Compete Card later if you choose.\",\"tft.players.profile.start.title\":\"Start Your Pro Journey\",\"tft.players.profile.start.description\":\"Welcome to competitive TFT, Tactician!\\n\\nThe first step on your path to pro is registering a Compete Card; your personal ID for everything competitive TFT. Registering for a card unlocks event registration, enables you to track event qualification and ladder progress, and connects everything you do on your path to the Pro Circuit.\\n\\nSo what do you say, Tactician? Care to start your pro journey?\",\"tft.players.profile.region.title\":\"Your Region\",\"tft.players.profile.region.description\":\"This is the region and shard you’ll be competing in, which we’ve pulled from your Riot player account.\\n\\nWhen registering for events, you'll be registering for this region's tournaments only. When competiting for tournament spots via qualification paths like the ranked ladder, you'll be competing with other players on the same shard. Some regional tournaments hold a specific number of spots for each shard, so make sure to check out each event's page for more information.\",\"tft.players.profile.region.yourRegion\":\"Your Region:\",\"tft.players.profile.region.yourShard\":\"Your Shard:\",\"tft.players.profile.region.amer\":\"AMER\",\"tft.players.profile.region.apac\":\"APAC\",\"tft.players.profile.region.emea\":\"EMEA\",\"tft.players.profile.region.cn\":\"CN\",\"tft.players.profile.name.title\":\"Request Tournament Display Name\",\"tft.players.profile.name.description\":\"This is how you will show up to other players in-game and on broadcast/streams during tournaments. You will receive tournament credentials which include the name and password on your Compete Card once they have been approved and issued. Please note that Tournament Realm Display Names are subject to approval and availability.\",\"tft.players.profile.name.placeholder\":\"Ex: Pengu\",\"tft.players.profile.assets.discord.title\":\"Enter Your Discord ID\",\"tft.players.profile.assets.discord.description\":\"This will help us contact you with match updates and information.\",\"tft.players.profile.assets.discord.placeholder\":\"Ex: PenguDiscord\",\"tft.players.profile.terms.title\":\"Accept Terms\",\"tft.players.profile.terms.description\":\"Read and accept the Global Player Policy. Scroll down to accept.\",\"tft.players.profile.terms.text\":\"$1c\",\"tft.players.profile.review.title\":\"Review Your Card\",\"tft.players.profile.review.description\":\"You're almost there!\\n\\nPlease make sure all of the information looks correct before registering your Compete Card. If everything looks good, hit Register My Card below to start your pro journey!\",\"tft.players.profile.done.title\":\"Congratulations!\",\"tft.players.profile.done.description\":\"Your Compete Card is now active. It connects your identity across events, ladders, and broadcasts; and it's your official ticket into the world of competitive TFT.\\n\\nYou can access your Compete Card anytime from the profile section of Compete TFT to update information or receive your tournament realm credentials.\\n\\nKeep your eyes out for upcoming events throughout each set and remember -- good luck and have fun, Tactician! We'll see you in the Convergence.\",\"tft.players.profile.edit.title\":\"Your Compete Profile\",\"tft.players.profile.edit.description\":\"This is where you can review your CompeteTFT profile, including your Compete Card. You can also find your tournament login credentials once they have been approved and issued. If you'd like to change your Tournament Realm Display Name, reach out to Player Support at {email}\",\"tft.players.profile.edit.description.withCredentials\":\"This is where you can review your Compete TFT profile, including your Compete Card. You can also find your tournament login credentials once they have been approved and issued. If you would like to change your Tournament Realm Display Name, please reach out to your regional tournament operators via Discord.\",\"tft.players.profile.edit.description.withoutCredentials\":\"This is where you can review your Compete TFT profile, including your Compete Card. You can also find your tournament login credentials once they have been approved and issued after you have qualified into a tournament.\",\"tft.players.profile.edit.email\":\"tk@riotgames.com\",\"tft.players.profile.edit.discord\":\"Discord\",\"tft.players.profile.edit.trDisplayName\":\"Tournament Realm Display Name\",\"tft.players.profile.edit.credentials.title\":\"Tournament Realm Login Credentials\",\"tft.players.profile.edit.credentials.description\":\"Your tournament credentials will appear here once they have been approved and issued.\",\"tft.players.profile.edit.username\":\"Username\",\"tft.players.profile.edit.password\":\"Password\",\"tft.players.profile.edit.success.title\":\"Compete Profile Updated\",\"tft.players.profile.edit.success.description\":\"Your profile information has been updated\",\"tft.players.profile.edit.copied\":\"Copied\",\"tft.players.profile.edit.leave.title\":\"Are you sure?\",\"tft.players.profile.edit.leave.description\":\"Your changes will not be saved if you exit now\",\"tft.players.register.error.playerAlreadyRegistered\":\"You already registered for this event\",\"tft.players.register.error.invalidShard.title\":\"Invalid Shard\",\"tft.players.register.error.invalidShard.description\":\"You cannot register for this tournament. Competitors can only register for tournaments within their own region. Please reference your Compete Card to find your region.\",\"tft.players.register.label.letsgo\":\"LET'S GO!\",\"tft.players.register.label.register\":\"Register\",\"tft.players.regi
